<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axpico — Offerte Amazon selezionate</title>
  <meta name="description" content="Le migliori offerte Amazon selezionate per te. Prezzi aggiornati, sconti reali, acquisto sicuro.">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="logo">axpico</a>
      <p class="tagline">Le migliori offerte Amazon, selezionate per te</p>
    </div>
  </header>

  <main>
    <div class="container">
      <div id="product-grid" class="product-grid"></div>
      <div id="empty-state" class="empty-state" hidden>
        <p>Nessun prodotto disponibile al momento. Torna presto!</p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="disclaimer">
        In qualità di Affiliato Amazon ricevo un guadagno dagli acquisti idonei.
        I prezzi potrebbero variare. Verifica il prezzo attuale su Amazon prima dell'acquisto.
      </p>
    </div>
  </footer>

  <script src="data/products.js"></script>
  <script src="assets/js/main.js"></script>

</html>
